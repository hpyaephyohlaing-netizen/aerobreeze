<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroBreeze - Place Your Order</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0f19; --panel-bg: #151c2c; --primary-gold: #ffcc00; --input-bg: #1f293d; --border-color: #24344d; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; padding: 40px 20px; margin:0; }
        .order-container { max-width: 650px; margin: 0 auto; background-color: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); border-color: rgba(255,204,0,0.4); }
        h2 { text-align: center; color: var(--primary-gold); margin-top: 0; margin-bottom: 25px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #ddd; font-weight: bold; font-size: 0.95rem; }
        label i { color: var(--primary-gold); margin-right: 5px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: white; font-size: 1rem; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--primary-gold); outline: none; }
        textarea { height: 100px; resize: none; }
        
        /* စုစုပေါင်း ကျသင့်ငွေပြသရန် Area Design */
        .price-summary-box { background: rgba(255, 204, 0, 0.08); border: 1px dashed var(--primary-gold); border-radius: 8px; padding: 15px; margin: 20px 0; text-align: center; }
        .price-summary-box p { margin: 5px 0; font-size: 1rem; color: #ccc; }
        .total-highlight { color: var(--primary-gold); font-size: 1.6rem; font-weight: bold; }

        .btn-submit { width: 100%; background-color: var(--primary-gold); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(255,204,0,0.2); transition: 0.2s; }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="order-container">
        <h2><i class="fa-solid fa-file-invoice"></i> အော်ဒါမှာယူရန်ဖောင် ({{ design.name }})</h2>
        
        <form action="{{ url_for('place_order', design_name=design.name) }}" method="POST">
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> မှာယူသူအမည်</label>
                <input type="text" name="customer_name" placeholder="လူကြီးမင်း၏ အမည်ကို ရိုက်ထည့်ပါ" required>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-phone"></i> ဆက်သွယ်ရမည့် ဖုန်းနံပါတ်</label>
                <input type="text" name="phone" placeholder="ဥပမာ - 09xxxxxxxxx" required>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-arrow-up-9-1"></i> မှာယူမည့် အရေအတွက် (ထည်)</label>
                <input type="number" id="quantity" name="quantity" value="{{ design.min_order_qty }}" min="{{ design.min_order_qty }}" oninput="calculateTotal()" required>
            </div>

            <div class="price-summary-box">
                <p>တစ်ထည်ချင်း ဈေးနှုန်း: <b style="color: #fff;">{{ "{:,}".format(design.price) }}</b> ကျပ်</p>
                <p>စုစုပေါင်း ကျသင့်ငွေ</p>
                <div class="total-highlight"><span id="total-display">0</span> ကျပ်</div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-location-dot"></i> ပို့ဆောင်ပေးရမည့် လိပ်စာ</label>
                <textarea name="address" placeholder="အိမ်နံပါတ်၊ လမ်း၊ မြို့နယ် ဖော်ပြပေးပါ" required></textarea>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-comment-dots"></i> အော်ဒါအသေးစိတ် မှတ်ချက် (စိတ်ကြိုက်)</label>
                <textarea name="note" placeholder="အရောင် သို့မဟုတ် အခြားစိတ်ကြိုက်ပြင်ဆင်လိုသည်များကို ရေးနိုင်ပါသည်"></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-check"></i> အော်ဒါမှာယူမှုကို အတည်ပြုမည်
            </button>
        </form>
    </div>

    <script>
        const unitPrice = parseInt("{{ design.price }}") || 0;

        function calculateTotal() {
            const qtyInput = document.getElementById('quantity');
            const qty = parseInt(qtyInput.value) || 0;
            const total = unitPrice * qty;
            
            // ငွေပမာဏကို ကော်မာ (,) ခံပြီး သန့်သန့်ရှင်းရှင်းပြသရန်
            document.getElementById('total-display').innerText = total.toLocaleString();
        }

        // စာမျက်နှာစဖွင့်ကတည်းက စုစုပေါင်းဈေးနှုန်းကို တစ်ခါတည်းတွက်ထားရန်
        window.onload = function() {
            calculateTotal();
        };
    </script>

</body>
</html>
